services:
  - type: web
    name: ai-smart-monitoring
    env: python
    plan: free
    rootDir: project
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
